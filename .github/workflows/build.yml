name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up MinGW
      uses: msys2/setup-msys2@v2
      with:
        msystem: UCRT64
        update: false
        install: mingw-w64-ucrt-x86_64-gcc

      - name: Build
        shell: msys2 {0}
        run: |
          VERSION=$(grep -m1 '^VERSION' Teefax.pro | tr -d ' ' | cut -d= -f2)
          g++ -std=c++17 -O2 -static-libgcc -static-libstdc++ \
            "-DPRG_VERSION=\"$VERSION\"" \
            -o teefax.exe main.cpp -lwinmm

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: teefax.exe
          generate_release_notes: true
