name: Build & Release

permissions:
  contents: write

# Läuft automatisch bei einem neuen Version-Tag (z. B. git tag v0.27.5 && git push origin v0.27.5)
# Manuell auslösbar über GitHub Actions → "Run workflow" (zum Testen ohne Release)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      # Qt installieren - nur fuer qmake + MinGW-Compiler.
      # Qt-Bibliotheken landen NICHT im Binary (CONFIG -= qt in Teefax.pro).
      # Lokale Umgebung: Qt 6.5.3 / MinGW 11.2.0 (mingw1120_64).
      # MinGW wird automatisch als Teil des Qt-Pakets mitinstalliert -
      # kein separater tools-Parameter noetig.
      # Cache spart ~2 Minuten bei Folge-Builds.
      - name: Qt + MinGW installieren
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: 'win64_mingw'
          cache: true

      # Release-Build via qmake + mingw32-make.
      # Die statischen Flags (-static-libgcc -static-libstdc++ -static) aus
      # Teefax.pro sorgen dafuer, dass die .exe keine MinGW-DLLs benoetigt.
      - name: Build (Release)
        shell: cmd
        run: |
          qmake Teefax.pro CONFIG+=release
          mingw32-make -j4

      # Kurztest: Binary starten und Exit-Code 0 pruefen.
      # Liefert auch die Versionsnummer fuer das Build-Log.
      - name: Kurztest
        shell: cmd
        run: release\teefax.exe --version

      # Artefakt hochladen - verfuegbar unter Actions -> Workflow-Run -> Artifacts.
      # Nuetzlich zum manuellen Download auch ohne Tag/Release.
      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: teefax-${{ github.ref_name }}
          path: release\teefax.exe
          if-no-files-found: error

      # GitHub Release anlegen - nur bei Tag-Pushes, nicht bei workflow_dispatch.
      # Der Tag-Name (z. B. v0.27.5) wird automatisch als Release-Titel verwendet.
      # GITHUB_TOKEN wird von Actions automatisch bereitgestellt, kein Setup noetig.
      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release\teefax.exe
          fail_on_unmatched_files: true
