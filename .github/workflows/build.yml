name: Build & Release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Läuft automatisch bei einem neuen Version-Tag (z. B. git tag v0.27.5 && git push origin v0.27.5)
# Manuell auslösbar über GitHub Actions → "Run workflow" (zum Testen ohne Release)
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      # Qt installieren - nur fuer qmake + MinGW-Compiler.
      # Qt-Bibliotheken landen NICHT im Binary (CONFIG -= qt in Teefax.pro).
      # Lokale Umgebung: Qt 6.5.3 / MinGW 11.2.0 (mingw1120_64).
      # MinGW wird automatisch als Teil des Qt-Pakets mitinstalliert -
      # kein separater tools-Parameter noetig.
      # Cache spart ~2 Minuten bei Folge-Builds.
      - name: Qt + MinGW installieren
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.5.3'
          arch: 'win64_mingw'
          cache: true

      # Release-Build via qmake + mingw32-make.
      # Die statischen Flags (-static-libgcc -static-libstdc++ -static) aus
      # Teefax.pro sorgen dafuer, dass die .exe keine MinGW-DLLs benoetigt.
      - name: Build (Release)
        shell: cmd
        run: |
          qmake Teefax.pro CONFIG+=release
          mingw32-make -j4

      # Kurztest: Binary starten und Exit-Code 0 pruefen.
      # Liefert auch die Versionsnummer fuer das Build-Log.
      - name: Kurztest
        shell: cmd
        run: release\teefax.exe --version

      # Unsigniertes Artefakt hochladen – wird von SignPath abgeholt und zurückgegeben.
      # Die artifact-id wird im naechsten Schritt als Referenz benoetigt.
      - name: Unsigniertes Artefakt hochladen
        id: upload-unsigned
        uses: actions/upload-artifact@v4
        with:
          name: teefax-unsigned-${{ github.ref_name }}
          path: release\teefax.exe
          if-no-files-found: error

      # SignPath-Aktion umgangen: direkter REST-API-Aufruf via PowerShell.
      # Die offizielle Aktion sendet intern immer ein GitHub-OIDC-Token, das
      # SignPath gegen eingetragene Trusted Build Systems prueft – ein Feature,
      # das im kostenlosen Plan nicht verfuegbar ist. Der direkte API-Aufruf
      # sendet nur den Bearer-Token und loest diese Pruefung nicht aus.
      - name: Signierung via SignPath API
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $orgId   = "ebfdf76f-61dd-4dae-8a54-d32e712bf788"
          $baseUrl = "https://app.signpath.io/API/v1/$orgId"
          $headers = @{ Authorization = "Bearer $env:SIGNPATH_API_TOKEN" }

          # Signing Request einreichen
          Write-Host "Reiche Signing Request ein..."
          $form = @{
            ProjectSlug               = "teefax"
            SigningPolicySlug         = "release-signing"
            ArtifactConfigurationSlug = "initial"
            Artifact                  = Get-Item "release\teefax.exe"
          }
          $req = Invoke-RestMethod -Uri "$baseUrl/SigningRequests" `
                                   -Method Post -Headers $headers -Form $form
          $rid = if ($req.signingRequestId) { $req.signingRequestId } else { $req.id }
          if (-not $rid) { Write-Error "Signing Request ID nicht gefunden."; exit 1 }
          Write-Host "Signing Request ID: $rid"

          # Auf Abschluss warten (max. 10 Minuten, Abfrage alle 10 s)
          $done = $false
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep -Seconds 10
            $s = Invoke-RestMethod -Uri "$baseUrl/SigningRequests/$rid" `
                                   -Headers $headers
            Write-Host "Status: $($s.status)"
            if ($s.status -eq "Completed") { $done = $true; break }
            if ($s.status -in @("Failed","Denied","Cancelled")) {
              Write-Error "Signierung fehlgeschlagen: $($s.status)"; exit 1
            }
          }
          if (-not $done) { Write-Error "Timeout: Signierung nicht abgeschlossen."; exit 1 }

          # Signierte .exe herunterladen
          New-Item -ItemType Directory -Force -Path "signed" | Out-Null
          Invoke-WebRequest -Uri "$baseUrl/SigningRequests/$rid/SignedArtifact" `
                            -Headers $headers -OutFile "signed\teefax.exe"
          Write-Host "Signierte .exe gespeichert."

      # Kurztest auf der signierten .exe – stellt sicher, dass die Signatur
      # die Ausfuehrbarkeit nicht beeintraechtigt hat.
      - name: Kurztest (signiert)
        shell: cmd
        run: signed\teefax.exe --version

      # Signiertes Artefakt als offizielles Artefakt hochladen
      - name: Signiertes Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: teefax-${{ github.ref_name }}
          path: signed\teefax.exe
          if-no-files-found: error

      # GitHub Release mit der signierten .exe erstellen
      - name: GitHub Release erstellen
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: signed\teefax.exe
          fail_on_unmatched_files: true
          generate_release_notes: true